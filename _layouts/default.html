<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body class="regular-page">
  <header class="site-header">
    <nav class="nav-container">
      <a class="site-title" href="{{ '/' | relative_url }}">AGENT·KB</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/posts/' | relative_url }}">Posts</a></li>
        <li><a href="{{ '/graph/' | relative_url }}">Graph</a></li>
        <li><a href="{{ '/interviews/' | relative_url }}">Interview</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
      </ul>
    </nav>
  </header>

  {{ content }}

  <footer class="site-footer">
    <span class="site-mark">AGENT·KB</span>
    <span>© {{ 'now' | date: "%Y" }} · ALL SYSTEMS NOMINAL</span>
  </footer>
</body>
</html>
