<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">首页</a></li>
        <li><a href="{{ '/posts/' | relative_url }}">文章</a></li>
        <li><a href="{{ '/about/' | relative_url }}">关于</a></li>
        <li><a href="{{ '/interviews/' | relative_url }}">面试记录</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ 'now' | date: "%Y" }} {{ site.title }} · Powered by Jekyll & GitHub Pages</p>
  </footer>
</body>
</html>
