---
layout: default
---
<main class="main-content">
  <article>
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
        {% if page.tags %}
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        {% endif %}
      </div>
    </header>
    <div class="post-content">{{ content }}</div>
  </article>
</main>
